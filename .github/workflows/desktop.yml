name: Build Desktop App

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clear Angular build cache
        run: Remove-Item -Path ".angular" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Build Angular app
        run: npm run build

      - name: Build Electron app (Windows)
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: windows-build
          path: release/quickboard-windows.exe
          retention-days: 1

  build-macos:
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clear Angular build cache
        run: rm -rf .angular

      - name: Build Angular app
        run: npm run build

      - name: Build Electron app (macOS)
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: macos-build
          path: |
            release/quickboard-mac.dmg
            release/quickboard-mac-intel.dmg
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clear Angular build cache
        run: rm -rf .angular

      - name: Build Angular app
        run: npm run build

      - name: Build Electron app (Linux)
        run: npm run electron:build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-build
          path: |
            release/quickboard-linux.AppImage
            release/quickboard-debian.deb
          retention-days: 1
