<div class="mobile-toolbar">
  <div class="menu-dropdown-container">
    <button class="menu-root-btn" (click)="toggleMenu('file', $event)">File</button>
    @if (activeMenu() === 'file') {
      <div class="menu-dropdown">
        <button (click)="triggerLoad(); closeMenu()">Load</button>
        <button (click)="triggerMobileSave(); closeMenu()">Save</button>
        <button (click)="triggerMobileSaveAs(); closeMenu()">Save As...</button>
        @if (isElectron) {
          <div class="menu-separator"></div>
          <button (click)="triggerMobileExport(); closeMenu()">Export...</button>
        }
        <div class="menu-separator"></div>
        <button (click)="triggerSettings(); closeMenu()">Settings</button>
      </div>
    }
  </div>
  <div class="menu-dropdown-container">
    <button class="menu-root-btn" (click)="toggleMenu('edit', $event)">Edit</button>
    @if (activeMenu() === 'edit') {
      <div class="menu-dropdown">
        <button (click)="triggerUndo(); closeMenu()">Undo</button>
        <button (click)="triggerRedo(); closeMenu()">Redo</button>
      </div>
    }
  </div>
  <div class="menu-dropdown-container">
    <button class="menu-root-btn" (click)="toggleMenu('view', $event)">View</button>
    @if (activeMenu() === 'view') {
      <div class="menu-dropdown">
        <div class="menu-label">Appearance</div>
        <button (click)="setTheme('system'); closeMenu()">
          <span
            class="check"
            [style.visibility]="currentTheme() === 'system' ? 'visible' : 'hidden'"
            >&#10003;</span
          >
          System
        </button>
        <button (click)="setTheme('white'); closeMenu()">
          <span class="check" [style.visibility]="currentTheme() === 'white' ? 'visible' : 'hidden'"
            >&#10003;</span
          >
          White
        </button>
        <button (click)="setTheme('light'); closeMenu()">
          <span class="check" [style.visibility]="currentTheme() === 'light' ? 'visible' : 'hidden'"
            >&#10003;</span
          >
          Light
        </button>
        <button (click)="setTheme('sepia'); closeMenu()">
          <span class="check" [style.visibility]="currentTheme() === 'sepia' ? 'visible' : 'hidden'"
            >&#10003;</span
          >
          Sepia
        </button>
        <button (click)="setTheme('dark'); closeMenu()">
          <span class="check" [style.visibility]="currentTheme() === 'dark' ? 'visible' : 'hidden'"
            >&#10003;</span
          >
          Dark
        </button>
        <button (click)="setTheme('black'); closeMenu()">
          <span class="check" [style.visibility]="currentTheme() === 'black' ? 'visible' : 'hidden'"
            >&#10003;</span
          >
          Black
        </button>
      </div>
    }
  </div>
  <div class="menu-dropdown-container">
    <button class="menu-root-btn" (click)="toggleMenu('help', $event)">Help</button>
    @if (activeMenu() === 'help') {
      <div class="menu-dropdown">
        <button (click)="triggerMobileAbout(); closeMenu()">About QuickBoard</button>
      </div>
    }
  </div>
</div>
