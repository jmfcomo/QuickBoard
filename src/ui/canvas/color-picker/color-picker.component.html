<div class="color-picker" [class.is-open]="isOpen()">
  <button
    type="button"
    class="color-trigger"
    (click)="toggleOpen()"
    [attr.aria-label]="label() + ' color'"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-controls]="panelId"
  >
    <span
      class="color-swatch"
      [class.transparent-checker]="isTransparent()"
      [style.background-color]="displayColor()"
    ></span>
  </button>

  @if (isOpen()) {
    <div
      class="color-panel"
      role="dialog"
      [id]="panelId"
      [attr.aria-label]="label() + ' color picker'"
    >
      <div
        #svArea
        class="sv-area"
        [style.background-image]="svBackground()"
        (pointerdown)="startSvDrag($event)"
        (pointermove)="onSvPointerMove($event)"
        (pointerup)="endSvDrag($event)"
        (pointercancel)="endSvDrag($event)"
        (lostpointercapture)="endSvDrag($event)"
        (keydown)="onSvKeydown($event)"
        tabindex="0"
        role="slider"
        aria-valuemin="0"
        aria-valuemax="100"
        [attr.aria-valuenow]="saturationPercentValue()"
        [attr.aria-valuetext]="svValueText()"
        [attr.aria-label]="label() + ' saturation and brightness'"
      >
        <span
          class="sv-handle"
          [style.left.%]="saturation() * 100"
          [style.top.%]="valueHandlePercent()"
        ></span>
      </div>

      <div class="slider-row">
        <label class="slider-label" [attr.for]="hueId">Hue</label>
        <input
          [id]="hueId"
          type="range"
          min="0"
          max="360"
          step="1"
          [value]="hue()"
          (input)="onHueInput($event)"
          class="color-slider hue-slider"
          [style.--slider-background]="hueGradient()"
          [attr.aria-label]="label() + ' hue'"
        >
      </div>

      <div class="slider-row">
        <label class="slider-label" [attr.for]="alphaId">Alpha</label>
        <input
          [id]="alphaId"
          type="range"
          min="0"
          max="100"
          step="1"
          [value]="alphaPercentValue()"
          (input)="onAlphaInput($event)"
          class="color-slider alpha-slider"
          [style.--slider-background]="alphaGradient()"
          [attr.aria-label]="label() + ' transparency'"
        >
      </div>

      <div class="preview-row">
        <div class="preview-group">
          <div
            class="preview-swatch"
            [class.transparent-checker]="isTransparent()"
            [style.background-color]="displayColor()"
          ></div>
          <div class="alpha-input-group">
            <input
              type="number"
              min="0"
              max="100"
              step="1"
              class="alpha-input"
              [value]="alphaText()"
              (input)="onAlphaTextInput($event)"
              (focus)="onAlphaFocus()"
              (blur)="onAlphaBlur()"
              [attr.aria-label]="label() + ' alpha percent'"
            >
            <span class="alpha-suffix">%</span>
          </div>
        </div>
        <div class="hex-group">
          <label class="hex-label" [attr.for]="hexId">Hex</label>
          <input
            [id]="hexId"
            type="text"
            class="hex-input"
            [value]="hexText()"
            (input)="onHexInput($event)"
            (focus)="onHexFocus()"
            (blur)="onHexBlur()"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="characters"
            [attr.aria-label]="label() + ' hex color'"
          >
        </div>
      </div>
    </div>
  }
</div>
