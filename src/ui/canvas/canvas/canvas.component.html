<app-properties-bar
  [activeTool]="activeTool()"
  [zoomLevel]="canvasZoomLevel()"
  [strokeSize]="strokeSize()"
  [brushSpacing]="brushSpacing()"
  [colorTolerance]="colorTolerance()"
  [colorPickers]="colorPickers"
  (zoomLevelChange)="setCanvasZoomLevel($event)"
  (strokeSizeChange)="setStrokeSize($event)"
  (strokeSizeFromSliderChange)="setStrokeSizeFromSlider($event)"
  (brushSpacingChange)="setBrushSpacing($event)"
  (colorToleranceChange)="setColorTolerance($event)"
></app-properties-bar>
<div class="canvas-container">
  <app-tools-bar
    [activeTool]="activeTool()"
    [isCanvasFullscreen]="isCanvasFullscreen()"
    (toolSelected)="setTool($event)"
    (imageSelected)="handleImageFile($event)"
    (clearCanvasRequested)="requestClearCanvas()"
    (canvasFullscreenToggled)="toggleCanvasFullscreen()"
  ></app-tools-bar>
  <div class="canvas-right">
    <div class="canvas-stage" #canvasStage (dragover)="onDragOver($event)" (drop)="onDrop($event)">
      <div class="canvas-board-stack">
        <div #canvasContainer class="literally-canvas"></div>
        <app-onion-skin-overlay
          [layers]="onionSkinLayers()"
          [layerRect]="onionLayerRect()"
          [imageRect]="onionImageRect()"
        ></app-onion-skin-overlay>
      </div>
    </div>
  </div>
</div>

<app-clear-canvas-confirm
  [visible]="showClearCanvasConfirm()"
  (cancelRequested)="cancelClearCanvas()"
  (confirmRequested)="confirmClearCanvas()"
></app-clear-canvas-confirm>
