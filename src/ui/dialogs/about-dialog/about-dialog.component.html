<div class="overlay" (click)="close.emit()">
  <div
    class="dialog"
    (click)="$event.stopPropagation()"
    role="dialog"
    aria-modal="true"
    aria-labelledby="about-dialog-title"
  >
    <div class="dialog-header">
      <button class="close-btn" (click)="close.emit()" aria-label="Close dialog">
        <svg
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M3 3L13 13M13 3L3 13"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
          />
        </svg>
      </button>
    </div>

    <div class="dialog-body">
      <div class="app-branding">
        <div class="app-logo">⚡</div>
        <h2 class="app-name" id="about-dialog-title">QuickBoard</h2>
        <p class="app-description">{{ info.description }}</p>
      </div>

      <div class="divider"></div>

      <div class="links-section">
        <p class="links-label">Links</p>
        <div class="link-row">
          <svg
            class="link-icon"
            viewBox="0 0 24 24"
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.09.682-.217.682-.482 0-.237-.009-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.068-.607.068-.607 1.003.07 1.532 1.03 1.532 1.03.892 1.529 2.341 1.087 2.91.832.091-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.03-2.682-.103-.253-.447-1.27.098-2.646 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.547 1.376.203 2.393.1 2.646.641.698 1.027 1.591 1.027 2.682 0 3.841-2.337 4.687-4.565 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48A10.002 10.002 0 0 0 22 12c0-5.523-4.477-10-10-10z"
            />
          </svg>
          <span class="link-text" [title]="githubUrl">{{ githubUrl }}</span>
        </div>
      </div>
    </div>

    <div class="dialog-footer">
      <span class="footer-text">Built with Angular &amp; Electron</span>
    </div>
  </div>
</div>
