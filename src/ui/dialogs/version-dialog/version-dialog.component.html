<div class="overlay" (click)="close.emit()">
  <div
    class="dialog"
    (click)="$event.stopPropagation()"
    role="dialog"
    aria-modal="true"
    aria-labelledby="version-dialog-title"
  >
    <div class="dialog-header">
      <div class="dialog-title-group">
        <span class="dialog-icon">⚡</span>
        <span class="dialog-title" id="version-dialog-title">QuickBoard</span>
      </div>
      <button class="close-btn" (click)="close.emit()" aria-label="Close dialog">
        <svg
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M3 3L13 13M13 3L3 13"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
          />
        </svg>
      </button>
    </div>

    <div class="dialog-body">
      <p class="dialog-subtitle">Version Information</p>
      <div class="version-list">
        <div class="version-row">
          <span class="version-label">QuickBoard</span>
          <span class="version-value">{{ info.quickboardVersion }}</span>
        </div>
        <div class="version-row">
          <span class="version-label">Electron</span>
          <span class="version-value">{{ info.appVersion }}</span>
        </div>
        <div class="version-row">
          <span class="version-label">Chrome</span>
          <span class="version-value">{{ info.chromeVersion }}</span>
        </div>
        <div class="version-row">
          <span class="version-label">Node.js</span>
          <span class="version-value">{{ info.nodeVersion }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
