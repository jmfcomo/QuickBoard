<input
  #audioFileInput
  type="file"
  accept="audio/*"
  style="display: none"
  (change)="handleFileInput($event)"
/>

<div class="audio-tracks-section">
  @for (lane of audioLanes(); track lane.laneIndex) {
    <div
      class="audio-lane"
      [attr.data-lane-index]="lane.laneIndex"
      [class.drag-target]="audioDragTargetLane() === lane.laneIndex && audioDragTrackId() !== null"
    >
      <div
        class="audio-lane-track"
        (dblclick)="openAudioFile(lane.laneIndex, getLaneInsertTime(lane.laneIndex))"
        (mousemove)="onLaneMouseMove($event, lane.laneIndex)"
        (mouseleave)="onLaneMouseLeave()"
        (dragover)="onLaneDragOver($event)"
        (drop)="onLaneDrop($event, lane.laneIndex)"
      >
        @if (lane.addButtonLeftPx !== null) {
          <button
            type="button"
            class="add-audio-clip-btn"
            [style.left.px]="lane.addButtonLeftPx"
            aria-label="Add audio in lane {{ lane.laneIndex + 1 }}"
            (click)="addAudioAtLaneEnd(lane.laneIndex)"
          >
            <span class="add-audio-clip-icon" aria-hidden="true">+</span>
          </button>
        }

        <!-- clips clipped to project duration -->
        <div class="audio-lane-clip-zone" [style.width.px]="projectWidthPx()">
          @for (clip of lane.clips; track clip.id) {
            <div
              class="audio-clip"
              [class.dragging]="audioDragTrackId() === clip.id"
              [class.trimming]="audioTrimTrackId() === clip.id"
              [style.left.px]="clip.leftPx"
              [style.width.px]="clip.widthPx"
              [title]="clip.name"
              (mousedown)="startAudioClipDrag($event, clip.id, clip.startTime)"
              (touchstart)="startAudioClipDrag($event, clip.id, clip.startTime)"
            >
              <div
                class="audio-trim-handle audio-trim-handle-left"
                (mousedown)="$event.stopPropagation(); startAudioTrim($event, clip.id, 'left')"
                (touchstart)="$event.stopPropagation(); startAudioTrim($event, clip.id, 'left')"
              ></div>
              <div
                class="audio-trim-handle audio-trim-handle-right"
                (mousedown)="$event.stopPropagation(); startAudioTrim($event, clip.id, 'right')"
                (touchstart)="$event.stopPropagation(); startAudioTrim($event, clip.id, 'right')"
              ></div>
              @if (clip.waveformPath) {
                <svg
                  class="audio-waveform"
                  [attr.viewBox]="'0 0 ' + clip.widthPx + ' 36'"
                  preserveAspectRatio="none"
                  aria-hidden="true"
                >
                  <path [attr.d]="clip.waveformPath" class="waveform-path" />
                </svg>
              }
              <div
                class="audio-volume-hitbox"
                [style.top.%]="getVolumeLineTopPercent(clip.volume)"
                [attr.title]="getVolumeTooltip(clip.volume)"
                (mousedown)="startVolumeDrag($event, clip.id)"
                (touchstart)="startVolumeDrag($event, clip.id)"
              >
                <div
                  class="audio-volume-line"
                  [class.dragging]="volumeDragTrackId() === clip.id"
                ></div>
              </div>
              <span class="audio-clip-name">{{ clip.name }}</span>
            </div>
          }
        </div>

        <!-- project end marker -->
        <div class="audio-lane-end-marker" [style.left.px]="projectWidthPx()"></div>

        <!-- Delete buttons outside clip-zone so they stay visible when a clip is cut off -->
        @for (clip of lane.clips; track clip.id) {
          @if (hoveredClipId() === clip.id) {
            <button
              type="button"
              class="audio-clip-delete"
              [style.left.px]="clip.deleteLeftPx"
              [attr.aria-label]="'Remove ' + clip.name"
              (click)="$event.stopPropagation(); removeAudioTrack(clip.id)"
            >
              <span aria-hidden="true">×</span>
            </button>
          }
        }
      </div>
    </div>
  }

  @if (canAddLane()) {
    <div class="audio-lane audio-lane-add-row">
      <div class="audio-lane-track"></div>
    </div>
  }
</div>
