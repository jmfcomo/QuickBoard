<div class="controls-top-spacer"></div>

@for (lane of audioLanes(); track lane.laneIndex) {
  <div class="controls-lane" [class.last-lane]="!canAddLane() && $last">
    <button
      type="button"
      class="lane-mute-btn"
      [class.muted]="lane.muted"
      [attr.aria-label]="
        lane.muted ? 'Unmute lane ' + (lane.laneIndex + 1) : 'Mute lane ' + (lane.laneIndex + 1)
      "
      [attr.title]="lane.muted ? 'Unmute' : 'Mute'"
      (click)="setLaneMuted(lane.laneIndex)"
    >
      M
    </button>
    <button
      type="button"
      class="lane-delete-btn"
      aria-label="Remove audio lane {{ lane.laneIndex + 1 }}"
      title="Remove lane"
      [class.hidden]="audioLanes().length === 1"
      (click)="removeLane(lane.laneIndex)"
    >
      <span aria-hidden="true">×</span>
    </button>
  </div>
}

@if (canAddLane()) {
  <div class="controls-add-lane-row">
    <button
      type="button"
      class="controls-add-lane-btn"
      aria-label="Add audio lane"
      title="Add audio lane"
      (click)="addLane()"
    >
      <span class="controls-add-lane-icon" aria-hidden="true">+</span>
    </button>
  </div>
}

<div class="controls-bottom-spacer"></div>
