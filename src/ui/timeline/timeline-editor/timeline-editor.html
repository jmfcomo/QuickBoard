<div
  #scrollContainer
  class="timeline-scroll-area custom-scrollbar"
  role="region"
  aria-label="Timeline Editor"
>
  <div class="timeline-inner">
    <app-timeline-controls />
    <div #timelineContent class="timeline-content" [style.width.px]="totalWidth()">
      <div class="timeline-ruler" aria-hidden="true" (click)="onRulerClick($event)">
        @for (tick of rulerTicks(); track tick.time) {
          <div class="timeline-tick" [class.origin]="tick.time === 0" [style.left.px]="tick.left">
            <span class="tick-label">{{ tick.label }}</span>
          </div>
        }
      </div>

      <div #playhead class="timeline-playhead" (mousedown)="startScrub($event)">
        <div class="playhead-head"></div>
        <div class="playhead-line"></div>
      </div>

      <div class="timeline-tracks" role="listbox" aria-label="Timeline Boards">
        <app-boards-track [scale]="scale()" [containerWidth]="containerWidth()" />
        <app-audio-tracks [scale]="scale()" />
      </div>
    </div>
  </div>
</div>
