<div class="timeline-menu">
  <div class="menu-section menu-left">
    <span class="timecode-display">{{ formatTime(store.currentTime(), true) }}</span>
  </div>

  <div class="menu-section menu-center">
    <div class="boil-control">
      <button
        class="boil-btn"
        [class.active]="currentBoilEnabled()"
        [attr.aria-label]="
          currentBoilEnabled() ? 'Disable line boiling for this frame' : 'Enable line boiling for this frame'
        "
        [attr.title]="
          currentBoilEnabled() ? 'Disable line boiling for this frame' : 'Enable line boiling for this frame'
        "
        [attr.aria-pressed]="currentBoilEnabled()"
        (pointerdown)="onBoilPointerDown($event)"
        (pointerup)="onBoilPointerUp()"
        (pointercancel)="onBoilPointerCancel()"
        (pointerleave)="onBoilPointerCancel()"
        (contextmenu)="onBoilContextMenu($event)"
      >
        <svg viewBox="0 0 24 24" class="boil-icon" aria-hidden="true" focusable="false">
          <path d="M3 9c2-2.4 4-2.4 6 0s4 2.4 6 0 4-2.4 6 0"></path>
          <path d="M3 15c2-2.4 4-2.4 6 0s4 2.4 6 0 4-2.4 6 0"></path>
        </svg>
      </button>
      @if (boilSubmenuOpen()) {
      <div class="boil-submenu" role="group" aria-label="Line boiling parameters">
        <div class="boil-submenu-title">Line Boiling</div>
        <label class="boil-field">
          <span>Variations</span>
          <input
            type="number"
            min="2"
            max="12"
            [value]="currentBoilParams().variations"
            (change)="setBoilParam('variations', $any($event.target).value)"
          />
        </label>
        <label class="boil-field">
          <span>Hold Frames</span>
          <input
            type="number"
            min="1"
            max="24"
            [value]="currentBoilParams().holdFrames"
            (change)="setBoilParam('holdFrames', $any($event.target).value)"
          />
        </label>
        <label class="boil-field">
          <span>Jitter (px)</span>
          <input
            type="number"
            min="0"
            max="20"
            step="0.5"
            [value]="currentBoilParams().amount"
            (change)="setBoilParam('amount', $any($event.target).value)"
          />
        </label>
      </div>
      }
    </div>
    <button
      class="onion-skin-btn"
      [class.active]="store.onionSkinEnabled()"
      [attr.aria-label]="
        store.onionSkinEnabled() ? 'Disable onion skinning' : 'Enable onion skinning'
      "
      [attr.title]="store.onionSkinEnabled() ? 'Disable onion skinning' : 'Enable onion skinning'"
      [attr.aria-pressed]="store.onionSkinEnabled()"
      (click)="toggleOnionSkin()"
    >
      <svg viewBox="0 0 24 24" class="onion-skin-icon" aria-hidden="true" focusable="false">
        <circle cx="9" cy="12" r="5.6" class="left"></circle>
        <circle cx="15" cy="12" r="5.6" class="right"></circle>
      </svg>
    </button>

    <div class="playback-controls-group">
      <button
        class="back-to-start-btn"
        [class.active]="store.isPlaying()"
        (click)="goToStart()"
        aria-label="Go to start"
      >
        <i class="fa-solid fa-step-backward" aria-hidden="true"></i>
      </button>
      <button
        class="back-one-board-btn"
        [class.active]="store.isPlaying()"
        (click)="backOneBoard()"
        aria-label="Back one board"
      >
        <i class="fa-solid fa-backward" aria-hidden="true"></i>
      </button>
      <button
        class="play-btn"
        [class.active]="store.isPlaying()"
        (click)="togglePlayback()"
        aria-label="Play/Pause"
      >
        <div class="play-icon" [class.playing]="store.isPlaying()">
          <span class="bar bar-left"></span>
          <span class="bar bar-right"></span>
        </div>
      </button>
      <button
        class="forward-one-board-btn"
        [class.active]="store.isPlaying()"
        (click)="forwardOneBoard()"
        aria-label="Forward one board"
      >
        <i class="fa-solid fa-forward" aria-hidden="true"></i>
      </button>
      <button
        class="forward-to-end-btn"
        [class.active]="store.isPlaying()"
        (click)="goToEnd()"
        aria-label="Go to end"
      >
        <i class="fa-solid fa-step-forward" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <div class="menu-section menu-right">
    <div class="right-controls">
      <div class="timeline-zoom" role="group" aria-label="Timeline zoom controls">
        <button
          class="zoom-btn"
          type="button"
          (click)="zoomOut()"
          [disabled]="isMinZoom()"
          aria-label="Zoom out timeline"
        >
          <i class="fa-solid fa-magnifying-glass-minus" aria-hidden="true"></i>
        </button>

        <input
          class="zoom-slider"
          type="range"
          [min]="sliderMin"
          [max]="sliderMax"
          step="1"
          [value]="sliderPosition()"
          (input)="updateZoom($any($event.target).value)"
          [style.--percent]="((sliderPosition() - sliderMin) / (sliderMax - sliderMin) * 100) + '%'"
          aria-label="Timeline zoom"
        />

        <button
          class="zoom-btn"
          type="button"
          (click)="zoomIn()"
          [disabled]="isMaxZoom()"
          aria-label="Zoom in timeline"
        >
          <i class="fa-solid fa-magnifying-glass-plus" aria-hidden="true"></i>
        </button>
      </div>

      <label class="duration-control">
        <span class="control-label">Duration</span>
        <div class="duration-input-wrap">
          <input
            type="number"
            min="0.1"
            step="0.1"
            [value]="currentDuration()"
            (input)="updateDuration($any($event.target).value)"
          />
          <span class="control-unit">s</span>
        </div>
      </label>
    </div>
  </div>
</div>
